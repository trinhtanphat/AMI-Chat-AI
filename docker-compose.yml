version: '3.8'

services:
  amichat:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXTAUTH_SECRET: "7zVLMloH8aAOlyJhRgQ3l76WE9Oryvs17uFwVg67OaE="
        DATABASE_URL: "file:./dev.db"
        ADMIN_EMAIL: "admin@vnso.vn"
        ADMIN_PASSWORD: "Admin@@6789@@"
    container_name: amichat
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:./dev.db
      - NEXTAUTH_URL=https://amichat.vnso.vn
      - NEXTAUTH_SECRET=7zVLMloH8aAOlyJhRgQ3l76WE9Oryvs17uFwVg67OaE=
      - ADMIN_EMAIL=admin@vnso.vn
      - ADMIN_PASSWORD=Admin@@6789@@
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://0.0.0.0:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - amichat-data:/app/prisma

volumes:
  amichat-data:
